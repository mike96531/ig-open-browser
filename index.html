<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
  --avo-green: #e9edc9;
  --avo-dark: #5d7a32; 
  --avo-accent: #d4a373;
  --creamy: #fefae0; 
  --text-main: #2d3e10;
  --herb-green: #76944a;
}

html, body {
  margin: 0;
  padding: 0;
  background-color: var(--avo-green);
  font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
  color: var(--text-main);
}

.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.card {
  background: var(--creamy);
  border-radius: 26px;
  padding: 36px 28px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  box-shadow: 0 16px 45px rgba(93, 122, 50, 0.12);
  border: 1px solid rgba(255,255,255,0.6);
}

.logo {
  font-size: 2.4rem;
  margin-bottom: 10px;
}

  .brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 6px;
}

.brand-emoji {
  font-size: 2.4rem;
}

.brand-text {
  font-size: 1.2rem;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--avo-dark);
}

h1 {
  font-size: 1.4rem;
  margin: 10px 0 8px 0;
  color: var(--avo-dark);
  letter-spacing: 2px;
}

.subtitle {
  font-size: 0.9rem;
  color: var(--herb-green);
  margin-bottom: 22px;
  letter-spacing: 2px;
}

.divider {
  width: 120px;
  height: 3px;
  background: var(--avo-accent);
  border-radius: 5px;
  margin: 0 auto 25px auto;
  opacity: 0.7;
}

.step {
  background: #fff;
  border-radius: 18px;
  padding: 18px 16px;
  margin-bottom: 14px;
  text-align: left;
  font-size: 0.95rem;
  line-height: 1.7;
  color: var(--avo-dark);
  box-shadow: 0 6px 18px rgba(0,0,0,0.04);
}

.step span {
  font-weight: 700;
  color: var(--avo-accent);
  margin-right: 6px;
}

.note {
  font-size: 0.85rem;
  color: #8a8a8a;
  margin-top: 18px;
  line-height: 1.6;
}

.btn {
  margin-top: 26px;
  display: inline-block;
  width: 100%;
  background: var(--herb-green);
  color: #fff;
  padding: 15px 0;
  border-radius: 14px;
  font-size: 1rem;
  font-weight: 600;
  letter-spacing: 1px;
  text-decoration: none;
}
</style>
</head>

<body>
<div class="page">
  <div class="card">

    <div class="brand">
  <span class="brand-emoji">🥑</span>
  <span class="brand-text">波波酪梨</span>
</div>


    <h1>請用瀏覽器開啟</h1>
    <div class="subtitle">IG/FB/Threads 內建瀏覽器可能無法正常瀏覽/下單</div>
    <div class="divider"></div>

    <div class="step">
      <span>①</span> 點擊右上角「⋯」
    </div>

    <div class="step">
      <span>②</span> 選擇「用系統瀏覽器開啟」
      <br>（Safari / Chrome）
    </div>

    <div class="step">
      <span>③</span> 重新開啟後，點擊下方按鈕即可正常訂購 🥑
    </div>

<a class="btn"
   href="https://linktr.ee/pro_bro_avocado"
   target="_blank"
   rel="noopener">
  👉 前往訂購頁
</a>


    <div class="note">
      小提醒：<br>
      IG 內建瀏覽器對某些功能有限制，<br>
      使用系統瀏覽器體驗會更順暢 💚
    </div>

  </div>
</div>
</body>
</html>
